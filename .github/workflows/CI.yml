name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - scripts/generate-go-proto.sh
              - scripts/lib/go-proto-tools.sh
              - cmds/**
              - servers/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GO_CHANGED: ${{ steps.filter.outputs.go }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${GO_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no Go-related changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping Go Quality: no relevant changes"

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Check go fmt
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: |
          set -euo pipefail

          formatted_output="$(go fmt ./...)"
          if [ -n "$formatted_output" ]; then
            echo "::error::go fmt reformatted files. Run 'go fmt ./...' locally and commit the result."
            printf '%s\n' "$formatted_output"
            exit 1
          fi

      - name: Run go vet
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go vet ./...

  go-test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - scripts/generate-go-proto.sh
              - scripts/lib/go-proto-tools.sh
              - cmds/**
              - servers/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GO_CHANGED: ${{ steps.filter.outputs.go }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${GO_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no Go-related changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping Go Test on ${{ matrix.os }}: no relevant changes"

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Run go test
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go test ./...

  delibase-server:
    name: Delibase Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: delibase
          POSTGRES_PASSWORD: delibase_test
          POSTGRES_DB: delibase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U delibase -d delibase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            delibase:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - protos/delibase/gen/go/**
              - servers/delibase/**
              - servers/internal/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DELIBASE_CHANGED: ${{ steps.filter.outputs.delibase }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${DELIBASE_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no delibase server changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping delibase server checks: no relevant changes"

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install sqlc
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Check sqlc generated output
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: |
          set -euo pipefail

          servers/delibase/scripts/generate-sqlc.sh
          git diff --exit-code -- servers/delibase/internal/database/dbgen

      - name: Run delibase PostgreSQL tests
        if: ${{ steps.gate.outputs.run == 'true' }}
        env:
          DELIBASE_TEST_DATABASE_URL: postgres://delibase:delibase_test@127.0.0.1:5432/delibase?sslmode=disable
        run: go test -count=1 ./servers/delibase/...

  proto-delibase:
    name: Delibase Protobuf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            proto:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - protos/buf.gen.yaml
              - protos/buf.yaml
              - protos/delibase/**
              - scripts/check-proto.sh
              - scripts/generate-delibase-proto.sh
              - scripts/generate-proto.sh
              - scripts/lib/go-proto-tools.sh

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROTO_CHANGED: ${{ steps.filter.outputs.proto }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${PROTO_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no delibase Protobuf changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping delibase Protobuf checks: no relevant changes"

      - name: Resolve delibase Protobuf compatibility baseline
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        env:
          BASELINE_COMMIT: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          set -euo pipefail

          baseline_path="protos/delibase/delibase.v1.binpb"
          if [ -z "${BASELINE_COMMIT}" ] || [[ "${BASELINE_COMMIT}" =~ ^0+$ ]]; then
            echo "No prior event commit is available; using the checked-in initial baseline"
          elif ! git cat-file -e "${BASELINE_COMMIT}^{commit}"; then
            echo "The prior event commit is not available: ${BASELINE_COMMIT}" >&2
            exit 1
          elif git cat-file -e "${BASELINE_COMMIT}:${baseline_path}"; then
            immutable_baseline="${RUNNER_TEMP}/delibase.v1.binpb"
            git show "${BASELINE_COMMIT}:${baseline_path}" > "${immutable_baseline}"
            echo "DELIBASE_PROTO_BASELINE=${immutable_baseline}" >> "${GITHUB_ENV}"
            echo "Using the delibase v1 baseline from ${BASELINE_COMMIT}"
          else
            echo "The prior event commit has no delibase v1 baseline; using the checked-in initial baseline"
          fi

      - name: Setup pnpm
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: pnpm/action-setup@v5
        with:
          version: 10.26.2

      - name: Setup Node.js
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Check Protobuf compatibility and generated output
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: pnpm check:proto

      - name: Run delibase Protobuf tests
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go test ./protos/delibase/...

      - name: Run delibase Protobuf vet
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go vet ./protos/delibase/...

      - name: Typecheck delibase TypeScript artifacts
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: pnpm --filter @delinoio/delibase-connect typecheck

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
