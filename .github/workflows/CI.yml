name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - scripts/generate-go-proto.sh
              - scripts/lib/go-proto-tools.sh
              - cmds/**
              - servers/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GO_CHANGED: ${{ steps.filter.outputs.go }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${GO_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no Go-related changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping Go Quality: no relevant changes"

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Check go fmt
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: |
          set -euo pipefail

          formatted_output="$(go fmt ./...)"
          if [ -n "$formatted_output" ]; then
            echo "::error::go fmt reformatted files. Run 'go fmt ./...' locally and commit the result."
            printf '%s\n' "$formatted_output"
            exit 1
          fi

      - name: Run go vet
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go vet ./...

  go-test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - scripts/generate-go-proto.sh
              - scripts/lib/go-proto-tools.sh
              - cmds/**
              - servers/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GO_CHANGED: ${{ steps.filter.outputs.go }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${GO_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no Go-related changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping Go Test on ${{ matrix.os }}: no relevant changes"

      - name: Setup Go
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Run go test
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: go test ./...

