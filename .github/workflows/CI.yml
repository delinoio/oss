        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - .github/workflows/CI.yml
              - Cargo.toml
              - Cargo.lock
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - rust-toolchain
              - rust-toolchain.toml
              - '**/rust-toolchain'
              - '**/rust-toolchain.toml'
              - '**/*.rs'
              - crates/**

      - name: Determine whether to run
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUST_CHANGED: ${{ steps.filter.outputs.rust }}
        run: |
          set -euo pipefail

          run=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${RUST_CHANGED}" = "true" ]; then
            run=true
          fi

          echo "run=${run}" >> "${GITHUB_OUTPUT}"

      - name: Skip (no Rust-related changes)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: |
          echo "Skipping Rust fmt: no relevant changes"

      - name: Install Rust toolchain
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-01-01
          components: rustfmt

      - name: Cache Rust dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Run rustfmt
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: cargo fmt --all --check

