name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      node_devkit: ${{ steps.node-affected.outputs.node_devkit }}
      node_mpapp: ${{ steps.node-affected.outputs.node_mpapp }}
      node_public_docs: ${{ steps.node-affected.outputs.node_public_docs }}
      node_dexdex: ${{ steps.node-affected.outputs.node_dexdex }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci_workflow:
              - .github/workflows/CI.yml
            go:
              - .github/workflows/CI.yml
              - go.mod
              - go.sum
              - scripts/generate-go-proto.sh
              - scripts/lib/go-proto-tools.sh
              - cmds/**
              - servers/**
            rust:
              - .github/workflows/CI.yml
              - Cargo.toml
              - Cargo.lock
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - rust-toolchain
              - rust-toolchain.toml
              - '**/rust-toolchain'
              - '**/rust-toolchain.toml'
              - '**/*.rs'
              - crates/**

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Detect affected Node workspaces
        id: node-affected
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CI_WORKFLOW_CHANGED: ${{ steps.filter.outputs.ci_workflow }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${CI_WORKFLOW_CHANGED}" = "true" ]; then
            echo "node_devkit=true" >> "${GITHUB_OUTPUT}"
            echo "node_mpapp=true" >> "${GITHUB_OUTPUT}"
            echo "node_public_docs=true" >> "${GITHUB_OUTPUT}"
            echo "node_dexdex=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          affected_json="$(pnpm dlx turbo@2.8.20 query affected --packages devkit mpapp public-docs dexdex)"
          printf '%s\n' "${affected_json}"

          node_devkit="$(printf '%s' "${affected_json}" | jq -r '.data.affectedPackages.items | any(.name == "devkit")')"
          node_mpapp="$(printf '%s' "${affected_json}" | jq -r '.data.affectedPackages.items | any(.name == "mpapp")')"
          node_public_docs="$(printf '%s' "${affected_json}" | jq -r '.data.affectedPackages.items | any(.name == "public-docs")')"
          node_dexdex="$(printf '%s' "${affected_json}" | jq -r '.data.affectedPackages.items | any(.name == "dexdex")')"

          echo "node_devkit=${node_devkit}" >> "${GITHUB_OUTPUT}"
          echo "node_mpapp=${node_mpapp}" >> "${GITHUB_OUTPUT}"
          echo "node_public_docs=${node_public_docs}" >> "${GITHUB_OUTPUT}"
          echo "node_dexdex=${node_dexdex}" >> "${GITHUB_OUTPUT}"

  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Check go fmt
        run: |
          set -euo pipefail

          formatted_output="$(go fmt ./...)"
          if [ -n "$formatted_output" ]; then
            echo "::error::go fmt reformatted files. Run 'go fmt ./...' locally and commit the result."
            printf '%s\n' "$formatted_output"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  go-test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate Go protobuf artifacts
        shell: bash
        run: ./scripts/generate-go-proto.sh

      - name: Run go test
        run: go test ./...

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run rustfmt
        run: cargo fmt --all --check

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test --workspace --all-targets

  node-devkit-test:
    name: Node devkit test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_devkit == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Devkit tests
        run: pnpm --filter devkit... test

  node-devkit-build:
    name: Node devkit build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_devkit == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Devkit build
        run: pnpm --filter devkit... build

  node-mpapp-test:
    name: Node mpapp test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_mpapp == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mpapp tests
        run: pnpm --filter mpapp test

  node-mpapp-lint:
    name: Node mpapp lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_mpapp == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mpapp lint
        run: pnpm --filter mpapp lint

  node-public-docs-test:
    name: Node public-docs test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_public_docs == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run public-docs tests
        run: pnpm --filter public-docs test

  node-dexdex-test:
    name: Node dexdex test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_dexdex == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dexdex tests
        run: pnpm --filter dexdex test

  node-dexdex-ios-build:
    name: Node dexdex iOS build
    runs-on: macos-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.node_dexdex == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workaround: this job validates iOS packaging flow, not TypeScript type safety.
      # Remove this once DexDex `pnpm build` (tsc + vite) is enforced by a dedicated CI gate.
      - name: Build frontend bundle for iOS smoke test
        run: pnpm --filter dexdex exec vite build

      - name: Initialize iOS target
        run: pnpm --filter dexdex exec tauri ios init --ci

      - name: Run dexdex iOS smoke build
        run: pnpm --filter dexdex exec tauri ios build --ci --debug --target aarch64-sim --config '{"build":{"beforeBuildCommand":"true"}}'

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - go-quality
      - go-test
      - rust-fmt
      - rust-clippy
      - rust-test
      - node-devkit-test
      - node-devkit-build
      - node-mpapp-test
      - node-mpapp-lint
      - node-public-docs-test
      - node-dexdex-test
      - node-dexdex-ios-build
    steps:
      - run: exit 1
        if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
