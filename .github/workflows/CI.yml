            ci_workflow:
              - .github/workflows/CI.yml

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
