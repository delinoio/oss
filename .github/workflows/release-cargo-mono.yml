name: Release cargo-mono

on:
  push:
    tags:
      - "cargo-mono@v*"

permissions:
  contents: read

concurrency:
  group: release-cargo-mono-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish cargo-mono
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Validate registry token
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required for release-cargo-mono."
            exit 1
          fi

      - name: Publish cargo-mono
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo run -p cargo-mono -- publish
