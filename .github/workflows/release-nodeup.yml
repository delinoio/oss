name: Release nodeup

on:
  push:
    tags:
      - "nodeup@v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (for example: 0.2.0)"
        required: true
      dry_run:
        description: "If true, skip release publication and package-manager PR creation"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-nodeup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="nodeup@v${{ github.event.inputs.version }}"
            dry_run="${{ github.event.inputs.dry_run }}"
          else
            tag="${GITHUB_REF_NAME}"
            dry_run="false"
          fi

          version="${tag#nodeup@v}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.asset_os }}-${{ matrix.asset_arch }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: amd64
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset_os: darwin
            asset_arch: amd64
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset_os: darwin
            asset_arch: arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: amd64
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          target: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build nodeup
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p nodeup --release --target "${{ matrix.target }}"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          artifact_name="nodeup-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.${{ matrix.archive_ext }}"
          binary_name="nodeup-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          source_binary="target/${{ matrix.target }}/release/nodeup"

          if [ "${{ matrix.asset_os }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
            source_binary="${source_binary}.exe"
          fi

          cp "$source_binary" "dist/${binary_name}"

          if [ "${{ matrix.asset_os }}" = "windows" ]; then
            pwsh -NoLogo -NoProfile -Command "Compress-Archive -Path dist/${binary_name} -DestinationPath dist/${artifact_name}"
          else
            cp "dist/${binary_name}" dist/nodeup
            tar -C dist -czf "dist/${artifact_name}" nodeup
            rm -f dist/nodeup
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodeup-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-dist
          find dist -maxdepth 2 -type f -exec cp {} release-dist/ \;
          rm -rf dist
          mv release-dist dist
          find dist -maxdepth 1 -type f | sed 's#^#artifact: #' >&2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Generate checksums and signatures
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/release/generate-checksums.sh
          ./scripts/release/generate-checksums.sh --artifacts-dir dist

      - name: Create GitHub release
        if: env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true

      - name: Compute source archive checksum
        id: source
        shell: bash
        run: |
          set -euo pipefail

          source_url="https://github.com/delinoio/oss/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          curl -fsSL "$source_url" -o source.tar.gz
          source_sha="$(shasum -a 256 source.tar.gz | awk '{print $1}')"

          echo "source_url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Render Homebrew update
        if: env.DRY_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/release/update-homebrew.sh
          ./scripts/release/update-homebrew.sh \
            --project nodeup \
            --version "$RELEASE_VERSION" \
            --source-url "${{ steps.source.outputs.source_url }}" \
            --source-sha256 "${{ steps.source.outputs.source_sha }}" \
            --dry-run >/dev/null

      - name: Submit Homebrew update
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/release/update-homebrew.sh
          ./scripts/release/update-homebrew.sh \
            --project nodeup \
            --version "$RELEASE_VERSION" \
            --source-url "${{ steps.source.outputs.source_url }}" \
            --source-sha256 "${{ steps.source.outputs.source_sha }}"

      - name: Render winget update
        if: env.DRY_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/release/update-winget.sh

          asset_name="nodeup-windows-amd64.zip"
          asset_sha="$(grep " ${asset_name}$" dist/SHA256SUMS | awk '{print $1}')"
          asset_url="https://github.com/delinoio/oss/releases/download/${RELEASE_TAG}/${asset_name}"

          ./scripts/release/update-winget.sh \
            --package-id DelinoIO.Nodeup \
            --version "$RELEASE_VERSION" \
            --installer-url "$asset_url" \
            --installer-sha256 "$asset_sha" \
            --dry-run >/dev/null

      - name: Submit winget update
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/release/update-winget.sh

          asset_name="nodeup-windows-amd64.zip"
          asset_sha="$(grep " ${asset_name}$" dist/SHA256SUMS | awk '{print $1}')"
          asset_url="https://github.com/delinoio/oss/releases/download/${RELEASE_TAG}/${asset_name}"

          ./scripts/release/update-winget.sh \
            --package-id DelinoIO.Nodeup \
            --version "$RELEASE_VERSION" \
            --installer-url "$asset_url" \
            --installer-sha256 "$asset_sha"
