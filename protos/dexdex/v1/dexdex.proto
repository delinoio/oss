syntax = "proto3";

package dexdex.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/delinoio/oss/protos/dexdex/gen/dexdex/v1;dexdexv1";

enum UnitTaskStatus {
  UNIT_TASK_STATUS_UNSPECIFIED = 0;
  UNIT_TASK_STATUS_QUEUED = 1;
  UNIT_TASK_STATUS_IN_PROGRESS = 2;
  UNIT_TASK_STATUS_ACTION_REQUIRED = 3;
  UNIT_TASK_STATUS_BLOCKED = 4;
  UNIT_TASK_STATUS_COMPLETED = 5;
  UNIT_TASK_STATUS_FAILED = 6;
  UNIT_TASK_STATUS_CANCELLED = 7;
}

enum SubTaskType {
  SUB_TASK_TYPE_UNSPECIFIED = 0;
  SUB_TASK_TYPE_INITIAL_IMPLEMENTATION = 1;
  SUB_TASK_TYPE_REQUEST_CHANGES = 2;
  SUB_TASK_TYPE_PR_CREATE = 3;
  SUB_TASK_TYPE_PR_REVIEW_FIX = 4;
  SUB_TASK_TYPE_PR_CI_FIX = 5;
  SUB_TASK_TYPE_MANUAL_RETRY = 6;
}

enum SubTaskStatus {
  SUB_TASK_STATUS_UNSPECIFIED = 0;
  SUB_TASK_STATUS_QUEUED = 1;
  SUB_TASK_STATUS_IN_PROGRESS = 2;
  SUB_TASK_STATUS_WAITING_FOR_PLAN_APPROVAL = 3;
  SUB_TASK_STATUS_WAITING_FOR_USER_INPUT = 4;
  SUB_TASK_STATUS_COMPLETED = 5;
  SUB_TASK_STATUS_FAILED = 6;
  SUB_TASK_STATUS_CANCELLED = 7;
}

enum SubTaskCompletionReason {
  SUB_TASK_COMPLETION_REASON_UNSPECIFIED = 0;
  SUB_TASK_COMPLETION_REASON_SUCCEEDED = 1;
  SUB_TASK_COMPLETION_REASON_REVISED = 2;
  SUB_TASK_COMPLETION_REASON_PLAN_REJECTED = 3;
  SUB_TASK_COMPLETION_REASON_FAILED = 4;
  SUB_TASK_COMPLETION_REASON_CANCELLED_BY_USER = 5;
}

enum AgentSessionStatus {
  AGENT_SESSION_STATUS_UNSPECIFIED = 0;
  AGENT_SESSION_STATUS_STARTING = 1;
  AGENT_SESSION_STATUS_RUNNING = 2;
  AGENT_SESSION_STATUS_WAITING_FOR_INPUT = 3;
  AGENT_SESSION_STATUS_COMPLETED = 4;
  AGENT_SESSION_STATUS_FAILED = 5;
  AGENT_SESSION_STATUS_CANCELLED = 6;
}

enum SessionOutputKind {
  SESSION_OUTPUT_KIND_UNSPECIFIED = 0;
  SESSION_OUTPUT_KIND_TEXT = 1;
  SESSION_OUTPUT_KIND_PLAN_UPDATE = 2;
  SESSION_OUTPUT_KIND_TOOL_CALL = 3;
  SESSION_OUTPUT_KIND_TOOL_RESULT = 4;
  SESSION_OUTPUT_KIND_PROGRESS = 5;
  SESSION_OUTPUT_KIND_WARNING = 6;
  SESSION_OUTPUT_KIND_ERROR = 7;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_REVIEW_REQUESTED = 1;
  ACTION_TYPE_PR_CREATION_READY = 2;
  ACTION_TYPE_PLAN_APPROVAL_REQUIRED = 3;
  ACTION_TYPE_CI_FAILED = 4;
  ACTION_TYPE_MERGE_CONFLICT = 5;
  ACTION_TYPE_SECURITY_ALERT = 6;
  ACTION_TYPE_USER_INPUT_REQUIRED = 7;
}

enum PrStatus {
  PR_STATUS_UNSPECIFIED = 0;
  PR_STATUS_OPEN = 1;
  PR_STATUS_APPROVED = 2;
  PR_STATUS_CHANGES_REQUESTED = 3;
  PR_STATUS_MERGED = 4;
  PR_STATUS_CLOSED = 5;
  PR_STATUS_CI_FAILED = 6;
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_TASK_ACTION_REQUIRED = 1;
  NOTIFICATION_TYPE_PLAN_ACTION_REQUIRED = 2;
  NOTIFICATION_TYPE_PR_REVIEW_ACTIVITY = 3;
  NOTIFICATION_TYPE_PR_CI_FAILURE = 4;
  NOTIFICATION_TYPE_AGENT_SESSION_FAILED = 5;
  NOTIFICATION_TYPE_AGENT_INPUT_REQUIRED = 6;
}

enum StreamEventType {
  STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  STREAM_EVENT_TYPE_TASK_UPDATED = 1;
  STREAM_EVENT_TYPE_SUBTASK_UPDATED = 2;
  STREAM_EVENT_TYPE_SESSION_OUTPUT = 3;
  STREAM_EVENT_TYPE_SESSION_STATE_CHANGED = 4;
  STREAM_EVENT_TYPE_PR_UPDATED = 5;
  STREAM_EVENT_TYPE_REVIEW_ASSIST_UPDATED = 6;
  STREAM_EVENT_TYPE_INLINE_COMMENT_UPDATED = 7;
  STREAM_EVENT_TYPE_NOTIFICATION_CREATED = 8;
  STREAM_EVENT_TYPE_SESSION_FORK_UPDATED = 9;
  STREAM_EVENT_TYPE_WORKSPACE_WORK_STATUS_UPDATED = 10;
}

enum PlanDecision {
  PLAN_DECISION_UNSPECIFIED = 0;
  PLAN_DECISION_APPROVE = 1;
  PLAN_DECISION_REVISE = 2;
  PLAN_DECISION_REJECT = 3;
}

enum SessionForkIntent {
  SESSION_FORK_INTENT_UNSPECIFIED = 0;
  SESSION_FORK_INTENT_EXPLORE_ALTERNATIVE = 1;
  SESSION_FORK_INTENT_BRANCH_EXPERIMENT = 2;
}

enum SessionForkStatus {
  SESSION_FORK_STATUS_UNSPECIFIED = 0;
  SESSION_FORK_STATUS_ACTIVE = 1;
  SESSION_FORK_STATUS_ARCHIVED = 2;
}

enum WorkspaceWorkStatus {
  WORKSPACE_WORK_STATUS_UNSPECIFIED = 0;
  WORKSPACE_WORK_STATUS_FAILED = 1;
  WORKSPACE_WORK_STATUS_ACTION_REQUIRED = 2;
  WORKSPACE_WORK_STATUS_WAITING_FOR_INPUT = 3;
  WORKSPACE_WORK_STATUS_RUNNING = 4;
  WORKSPACE_WORK_STATUS_IDLE = 5;
  WORKSPACE_WORK_STATUS_DISCONNECTED = 6;
}

enum AgentCliType {
  AGENT_CLI_TYPE_UNSPECIFIED = 0;
  AGENT_CLI_TYPE_CODEX_CLI = 1;
  AGENT_CLI_TYPE_CLAUDE_CODE = 2;
  AGENT_CLI_TYPE_OPENCODE = 3;
}

message Workspace {
  string workspace_id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message RepositoryRef {
  string repository_id = 1;
  string repository_url = 2;
  string branch_ref = 3;
}

message RepositoryGroup {
  string repository_group_id = 1;
  repeated RepositoryRef repositories = 2;
}

message CommitMetadata {
  string sha = 1;
  repeated string parents = 2;
  string message = 3;
  google.protobuf.Timestamp authored_at = 4;
  google.protobuf.Timestamp committed_at = 5;
}

message UnitTask {
  string unit_task_id = 1;
  UnitTaskStatus status = 2;
  ActionType action_required = 3;
  string title = 4;
  string description = 5;
  string workspace_id = 6;
  string repository_group_id = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  int32 sub_task_count = 10;
}

message SubTask {
  string sub_task_id = 1;
  string unit_task_id = 2;
  SubTaskType type = 3;
  SubTaskStatus status = 4;
  SubTaskCompletionReason completion_reason = 5;
  repeated CommitMetadata commit_chain = 6;
  string title = 7;
  string session_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message StreamWorkspaceEventsRequest {
  string workspace_id = 1;
  // from_sequence is exclusive. Server must emit events where sequence > from_sequence.
  uint64 from_sequence = 2;
}

message EventStreamCursorOutOfRangeDetail {
  uint64 earliest_available_sequence = 1;
  uint64 requested_from_sequence = 2;
}

message SessionOutputEvent {
  string session_id = 1;
  SessionOutputKind kind = 2;
  string body = 3;
}

message SessionStateChangedEvent {
  string session_id = 1;
  AgentSessionStatus status = 2;
}

message PrUpdatedEvent {
  PullRequestRecord pull_request = 1;
}

message ReviewAssistUpdatedEvent {
  ReviewAssistItem item = 1;
}

message InlineCommentUpdatedEvent {
  ReviewComment comment = 1;
}

message NotificationCreatedEvent {
  NotificationRecord notification = 1;
}

message SessionSummary {
  string session_id = 1;
  string parent_session_id = 2;
  string root_session_id = 3;
  SessionForkStatus fork_status = 4;
  uint64 forked_from_sequence = 5;
  AgentSessionStatus agent_session_status = 6;
  google.protobuf.Timestamp created_at = 7;
}

message AgentCapability {
  AgentCliType agent_cli_type = 1;
  bool supports_fork = 2;
  string display_name = 3;
}

message SessionForkUpdatedEvent {
  SessionSummary session_summary = 1;
}

message WorkspaceWorkStatusUpdatedEvent {
  string workspace_id = 1;
  WorkspaceWorkStatus status = 2;
}

message StreamWorkspaceEventsResponse {
  uint64 sequence = 1;
  string workspace_id = 2;
  StreamEventType event_type = 3;
  google.protobuf.Timestamp occurred_at = 4;

  oneof payload {
    // STREAM_EVENT_TYPE_TASK_UPDATED
    UnitTask task = 10;
    // STREAM_EVENT_TYPE_SUBTASK_UPDATED
    SubTask sub_task = 11;
    // STREAM_EVENT_TYPE_SESSION_OUTPUT
    SessionOutputEvent session_output = 12;
    // STREAM_EVENT_TYPE_SESSION_STATE_CHANGED
    SessionStateChangedEvent session_state_changed = 13;
    // STREAM_EVENT_TYPE_PR_UPDATED
    PrUpdatedEvent pr_updated = 14;
    // STREAM_EVENT_TYPE_REVIEW_ASSIST_UPDATED
    ReviewAssistUpdatedEvent review_assist_updated = 15;
    // STREAM_EVENT_TYPE_INLINE_COMMENT_UPDATED
    InlineCommentUpdatedEvent inline_comment_updated = 16;
    // STREAM_EVENT_TYPE_NOTIFICATION_CREATED
    NotificationCreatedEvent notification_created = 17;
    // STREAM_EVENT_TYPE_SESSION_FORK_UPDATED
    SessionForkUpdatedEvent session_fork_updated = 18;
    // STREAM_EVENT_TYPE_WORKSPACE_WORK_STATUS_UPDATED
    WorkspaceWorkStatusUpdatedEvent workspace_work_status_updated = 19;
  }
}

message SubmitPlanDecisionRequest {
  string workspace_id = 1;
  reserved 2;
  reserved "unit_task_id";
  // Decision target is identified by sub_task_id.
  string sub_task_id = 3;
  // APPROVE: resume current subtask (WAITING_FOR_PLAN_APPROVAL -> IN_PROGRESS).
  // REVISE: requires non-empty revision_note, completes current subtask as REVISED,
  // and creates a queued REQUEST_CHANGES subtask.
  // REJECT: cancels current subtask as PLAN_REJECTED and creates no follow-up.
  PlanDecision decision = 4;
  // Required when decision is REVISE.
  string revision_note = 5;
}

message SubmitPlanDecisionResponse {
  SubTask updated_sub_task = 1;
  SubTask created_sub_task = 2;
}

message GetUnitTaskRequest {
  string workspace_id = 1;
  string unit_task_id = 2;
}

message GetUnitTaskResponse {
  UnitTask unit_task = 1;
}

message GetSubTaskRequest {
  string workspace_id = 1;
  string sub_task_id = 2;
}

message GetSubTaskResponse {
  SubTask sub_task = 1;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
}

message GetWorkspaceResponse {
  Workspace workspace = 1;
}

message GetRepositoryGroupRequest {
  string workspace_id = 1;
  string repository_group_id = 2;
}

message GetRepositoryGroupResponse {
  RepositoryGroup repository_group = 1;
}

message GetSessionOutputRequest {
  string workspace_id = 1;
  string session_id = 2;
}

message GetSessionOutputResponse {
  repeated SessionOutputEvent events = 1;
}

message GetPullRequestRequest {
  string workspace_id = 1;
  string pr_tracking_id = 2;
}

message PullRequestRecord {
  string pr_tracking_id = 1;
  PrStatus status = 2;
}

message GetPullRequestResponse {
  PullRequestRecord pull_request = 1;
}

message ListPullRequestsRequest {
  string workspace_id = 1;
}

message ListPullRequestsResponse {
  repeated PullRequestRecord pull_requests = 1;
}

message ListReviewAssistItemsRequest {
  string workspace_id = 1;
  string unit_task_id = 2;
}

message ReviewAssistItem {
  string review_assist_id = 1;
  string body = 2;
}

message ListReviewAssistItemsResponse {
  repeated ReviewAssistItem items = 1;
}

message ListReviewCommentsRequest {
  string workspace_id = 1;
  string pr_tracking_id = 2;
}

message ReviewComment {
  string review_comment_id = 1;
  string body = 2;
}

message ListReviewCommentsResponse {
  repeated ReviewComment comments = 1;
}

message GetBadgeThemeRequest {
  string workspace_id = 1;
}

message BadgeTheme {
  string badge_theme_id = 1;
  string theme_name = 2;
}

message GetBadgeThemeResponse {
  BadgeTheme theme = 1;
}

message ListNotificationsRequest {
  string workspace_id = 1;
}

message NotificationRecord {
  string notification_id = 1;
  NotificationType type = 2;
  string title = 3;
  string body = 4;
  string reference_id = 5;
  bool read = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListNotificationsResponse {
  repeated NotificationRecord notifications = 1;
}

// List and Create messages for task management.

message ListWorkspacesRequest {}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

message ListUnitTasksRequest {
  string workspace_id = 1;
  // Optional status filter. Empty means all statuses.
  repeated UnitTaskStatus status_filter = 2;
}

message ListUnitTasksResponse {
  repeated UnitTask unit_tasks = 1;
}

message CreateUnitTaskRequest {
  string workspace_id = 1;
  string title = 2;
  string description = 3;
  string repository_group_id = 4;
}

message CreateUnitTaskResponse {
  UnitTask unit_task = 1;
}

message ListSubTasksRequest {
  string workspace_id = 1;
  string unit_task_id = 2;
}

message ListSubTasksResponse {
  repeated SubTask sub_tasks = 1;
}

// Session fork and input handoff messages.

message ListSessionCapabilitiesRequest {
  string workspace_id = 1;
}

message ListSessionCapabilitiesResponse {
  repeated AgentCapability capabilities = 1;
}

message ForkSessionRequest {
  string workspace_id = 1;
  string parent_session_id = 2;
  SessionForkIntent fork_intent = 3;
  string prompt = 4;
}

message ForkSessionResponse {
  SessionSummary forked_session = 1;
}

message ListForkedSessionsRequest {
  string workspace_id = 1;
  string parent_session_id = 2;
}

message ListForkedSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message ArchiveForkedSessionRequest {
  string workspace_id = 1;
  string session_id = 2;
}

message ArchiveForkedSessionResponse {}

message GetLatestWaitingSessionRequest {
  string workspace_id = 1;
}

message GetLatestWaitingSessionResponse {
  SessionSummary session = 1;
}

message SubmitSessionInputRequest {
  string workspace_id = 1;
  string session_id = 2;
  string input_text = 3;
}

message SubmitSessionInputResponse {}

message GetWorkspaceWorkStatusRequest {
  string workspace_id = 1;
}

message GetWorkspaceWorkStatusResponse {
  WorkspaceWorkStatus status = 1;
}

message MarkNotificationReadRequest {
  string workspace_id = 1;
  string notification_id = 2;
}

message MarkNotificationReadResponse {
  NotificationRecord notification = 1;
}

// Worker adapter messages.

message GetAgentCapabilitiesRequest {}

message GetAgentCapabilitiesResponse {
  repeated AgentCapability capabilities = 1;
}

message ForkSessionAdapterRequest {
  string session_id = 1;
  SessionForkIntent fork_intent = 2;
  string prompt = 3;
}

message ForkSessionAdapterResponse {
  string forked_session_id = 1;
}

message UpdateUnitTaskStatusRequest {
  string workspace_id = 1;
  string unit_task_id = 2;
  UnitTaskStatus status = 3;
}

message UpdateUnitTaskStatusResponse {
  UnitTask unit_task = 1;
}

// Repository group listing messages.

message ListRepositoryGroupsRequest {
  string workspace_id = 1;
}

message ListRepositoryGroupsResponse {
  repeated RepositoryGroup repository_groups = 1;
}

// Worker execution adapter messages.

message StartExecutionRequest {
  string workspace_id = 1;
  string unit_task_id = 2;
  string sub_task_id = 3;
  string session_id = 4;
  RepositoryGroup repository_group = 5;
  string prompt = 6;
  AgentCliType agent_cli_type = 7;
}

message ExecutionEvent {
  oneof event {
    SessionOutputEvent session_output = 1;
    SessionStateChangedEvent state_changed = 2;
    CommitMetadata commit = 3;
  }
}

message SubmitWorkerInputRequest {
  string session_id = 1;
  string input_text = 2;
}

message SubmitWorkerInputResponse {}

message CancelExecutionRequest {
  string session_id = 1;
}

message CancelExecutionResponse {}

// PR update messages.

message UpdatePullRequestRequest {
  string workspace_id = 1;
  string pr_tracking_id = 2;
  PrStatus status = 3;
}

message UpdatePullRequestResponse {
  PullRequestRecord pull_request = 1;
}

service WorkspaceService {
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc GetWorkspaceWorkStatus(GetWorkspaceWorkStatusRequest) returns (GetWorkspaceWorkStatusResponse);
}

service RepositoryService {
  rpc GetRepositoryGroup(GetRepositoryGroupRequest) returns (GetRepositoryGroupResponse);
  rpc ListRepositoryGroups(ListRepositoryGroupsRequest) returns (ListRepositoryGroupsResponse);
}

service TaskService {
  rpc GetUnitTask(GetUnitTaskRequest) returns (GetUnitTaskResponse);
  rpc GetSubTask(GetSubTaskRequest) returns (GetSubTaskResponse);
  rpc ListUnitTasks(ListUnitTasksRequest) returns (ListUnitTasksResponse);
  rpc ListSubTasks(ListSubTasksRequest) returns (ListSubTasksResponse);
  rpc CreateUnitTask(CreateUnitTaskRequest) returns (CreateUnitTaskResponse);
  rpc UpdateUnitTaskStatus(UpdateUnitTaskStatusRequest) returns (UpdateUnitTaskStatusResponse);
  rpc SubmitPlanDecision(SubmitPlanDecisionRequest) returns (SubmitPlanDecisionResponse);
}

service SessionService {
  rpc GetSessionOutput(GetSessionOutputRequest) returns (GetSessionOutputResponse);
  rpc ListSessionCapabilities(ListSessionCapabilitiesRequest) returns (ListSessionCapabilitiesResponse);
  rpc ForkSession(ForkSessionRequest) returns (ForkSessionResponse);
  rpc ListForkedSessions(ListForkedSessionsRequest) returns (ListForkedSessionsResponse);
  rpc ArchiveForkedSession(ArchiveForkedSessionRequest) returns (ArchiveForkedSessionResponse);
  rpc GetLatestWaitingSession(GetLatestWaitingSessionRequest) returns (GetLatestWaitingSessionResponse);
  rpc SubmitSessionInput(SubmitSessionInputRequest) returns (SubmitSessionInputResponse);
}

service PrManagementService {
  rpc GetPullRequest(GetPullRequestRequest) returns (GetPullRequestResponse);
  rpc ListPullRequests(ListPullRequestsRequest) returns (ListPullRequestsResponse);
  rpc UpdatePullRequest(UpdatePullRequestRequest) returns (UpdatePullRequestResponse);
}

service ReviewAssistService {
  rpc ListReviewAssistItems(ListReviewAssistItemsRequest) returns (ListReviewAssistItemsResponse);
}

service ReviewCommentService {
  rpc ListReviewComments(ListReviewCommentsRequest) returns (ListReviewCommentsResponse);
}

service BadgeThemeService {
  rpc GetBadgeTheme(GetBadgeThemeRequest) returns (GetBadgeThemeResponse);
}

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
}

service WorkerSessionAdapterService {
  rpc GetAgentCapabilities(GetAgentCapabilitiesRequest) returns (GetAgentCapabilitiesResponse);
  rpc ForkSessionAdapter(ForkSessionAdapterRequest) returns (ForkSessionAdapterResponse);
  rpc StartExecution(StartExecutionRequest) returns (stream ExecutionEvent);
  rpc SubmitWorkerInput(SubmitWorkerInputRequest) returns (SubmitWorkerInputResponse);
  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse);
}

service EventStreamService {
  // from_sequence is exclusive. The first emitted event always satisfies sequence > from_sequence.
  // If from_sequence is older than retention, the server returns OutOfRange and
  // includes EventStreamCursorOutOfRangeDetail with earliest_available_sequence.
  rpc StreamWorkspaceEvents(StreamWorkspaceEventsRequest) returns (stream StreamWorkspaceEventsResponse);
}
