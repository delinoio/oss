syntax = "proto3";

package dexdex.v1;

option go_package = "github.com/delinoio/oss/protos/dexdex/gen/dexdex/v1;dexdexv1";

// Compatibility shim for consumers importing the historical single-file contract.
// All canonical definitions now live in domain-specific files under v1/.
import "v1/common.proto";
import "v1/workspace.proto";
import "v1/repository.proto";
import "v1/task.proto";
import "v1/session.proto";
import "v1/pr.proto";
import "v1/review.proto";
import "v1/notification.proto";
import "v1/event_stream.proto";

message DexDexCompatContractRefs {
  Workspace workspace = 1;
  RepositoryGroup repository_group = 2;
  UnitTask unit_task = 3;
  AgentSession agent_session = 4;
  PullRequestRecord pull_request = 5;
  ReviewAssistItem review_assist_item = 6;
  NotificationRecord notification = 7;
  StreamWorkspaceEventsResponse stream_event = 8;
  CommitMetadata commit_metadata = 9;
}
