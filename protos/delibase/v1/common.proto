syntax = "proto3";

package delibase.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/delinoio/oss/protos/delibase/gen/go/delibase/v1;delibasev1";

// UuidV7 carries the canonical lowercase string form of a persisted UUID v7.
message UuidV7 {
  string value = 1;
}

// UsdMicros is a signed 64-bit count of USD micro-units (1 USD = 1,000,000).
message UsdMicros {
  int64 value = 1;
}

// UsageUnits is a signed 64-bit count in a catalog meter's integer unit.
message UsageUnits {
  int64 value = 1;
}

// PageRequest requests an opaque-cursor page. page_size is a hint bounded by the server.
message PageRequest {
  int32 page_size = 1;
  string cursor = 2;
}

// PageResponse provides a cursor that is empty when no later page exists.
message PageResponse {
  string next_cursor = 1;
}

// IdempotencyKey scopes a caller-selected key to the authenticated caller identity
// and concrete operation. The caller is the user subject for human RPCs and the
// service identity for M2M RPCs. key is opaque and must not contain credentials.
message IdempotencyKey {
  string key = 1;
}

// IdempotencyResult identifies whether this response is the stored original result.
message IdempotencyResult {
  bool replayed = 1;
  IdempotentOperation operation = 2;
  google.protobuf.Timestamp originally_completed_at = 3;
}

enum IdempotentOperation {
  IDEMPOTENT_OPERATION_UNSPECIFIED = 0;
  IDEMPOTENT_OPERATION_COMPLETE_ONBOARDING = 1;
  IDEMPOTENT_OPERATION_DELETE_ACCOUNT = 2;
  IDEMPOTENT_OPERATION_CREATE_ORGANIZATION = 3;
  IDEMPOTENT_OPERATION_UPDATE_ORGANIZATION = 4;
  IDEMPOTENT_OPERATION_UPDATE_ORGANIZATION_SLUG = 5;
  IDEMPOTENT_OPERATION_DELETE_ORGANIZATION = 6;
  IDEMPOTENT_OPERATION_UPDATE_ORGANIZATION_MEMBER_ROLE = 7;
  IDEMPOTENT_OPERATION_REMOVE_ORGANIZATION_MEMBER = 8;
  IDEMPOTENT_OPERATION_LEAVE_ORGANIZATION = 9;
  reserved 10;
  reserved "IDEMPOTENT_OPERATION_CREATE_INVITATION";
  IDEMPOTENT_OPERATION_ACCEPT_INVITATION = 11;
  IDEMPOTENT_OPERATION_REVOKE_INVITATION = 12;
  IDEMPOTENT_OPERATION_CREATE_TEAM = 13;
  IDEMPOTENT_OPERATION_UPDATE_TEAM = 14;
  IDEMPOTENT_OPERATION_MOVE_TEAM = 15;
  IDEMPOTENT_OPERATION_DELETE_TEAM_SUBTREE = 16;
  IDEMPOTENT_OPERATION_SET_TEAM_MEMBERSHIP = 17;
  IDEMPOTENT_OPERATION_REMOVE_TEAM_MEMBERSHIP = 18;
  IDEMPOTENT_OPERATION_CREATE_SUBSCRIPTION_CHECKOUT = 19;
  IDEMPOTENT_OPERATION_CREATE_BILLING_PORTAL_SESSION = 20;
  IDEMPOTENT_OPERATION_UPDATE_OVERAGE_LIMIT = 21;
  IDEMPOTENT_OPERATION_RESERVE_USAGE = 22;
  IDEMPOTENT_OPERATION_COMMIT_USAGE = 23;
  IDEMPOTENT_OPERATION_RELEASE_USAGE = 24;
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_DELETION_PENDING = 2;
  ACCOUNT_STATUS_DISABLED = 3;
  ACCOUNT_STATUS_DELETED = 4;
}

enum OrganizationStatus {
  ORGANIZATION_STATUS_UNSPECIFIED = 0;
  ORGANIZATION_STATUS_ACTIVE = 1;
  ORGANIZATION_STATUS_DELETION_PENDING = 2;
  ORGANIZATION_STATUS_DELETED = 3;
}

enum OrganizationRole {
  ORGANIZATION_ROLE_UNSPECIFIED = 0;
  ORGANIZATION_ROLE_OWNER = 1;
  ORGANIZATION_ROLE_ADMIN = 2;
  ORGANIZATION_ROLE_MEMBER = 3;
}

enum TeamRole {
  TEAM_ROLE_UNSPECIFIED = 0;
  TEAM_ROLE_ADMIN = 1;
  TEAM_ROLE_MEMBER = 2;
}

enum TeamAccessSource {
  TEAM_ACCESS_SOURCE_UNSPECIFIED = 0;
  TEAM_ACCESS_SOURCE_ORGANIZATION_ROLE = 1;
  TEAM_ACCESS_SOURCE_DIRECT_MEMBERSHIP = 2;
  TEAM_ACCESS_SOURCE_ANCESTOR_MEMBERSHIP = 3;
}

enum InvitationStatus {
  INVITATION_STATUS_UNSPECIFIED = 0;
  INVITATION_STATUS_ACTIVE = 1;
  INVITATION_STATUS_REVOKED = 2;
  INVITATION_STATUS_EXPIRED = 3;
}

enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_STATUS_NONE = 1;
  SUBSCRIPTION_STATUS_CHECKOUT_PENDING = 2;
  SUBSCRIPTION_STATUS_ACTIVE = 3;
  SUBSCRIPTION_STATUS_PAST_DUE = 4;
  SUBSCRIPTION_STATUS_CANCELED = 5;
  SUBSCRIPTION_STATUS_REVOKED = 6;
}

enum BillingPeriodStatus {
  BILLING_PERIOD_STATUS_UNSPECIFIED = 0;
  BILLING_PERIOD_STATUS_OPEN = 1;
  BILLING_PERIOD_STATUS_CLOSED = 2;
}

enum LedgerOperation {
  LEDGER_OPERATION_UNSPECIFIED = 0;
  LEDGER_OPERATION_CREDIT_GRANT = 1;
  LEDGER_OPERATION_CREDIT_REVERSAL = 2;
  LEDGER_OPERATION_CREDIT_HOLD = 3;
  LEDGER_OPERATION_CREDIT_COMMIT = 4;
  LEDGER_OPERATION_CREDIT_RELEASE = 5;
  LEDGER_OPERATION_OVERAGE_HOLD = 6;
  LEDGER_OPERATION_OVERAGE_COMMIT = 7;
  LEDGER_OPERATION_OVERAGE_RELEASE = 8;
  LEDGER_OPERATION_CREDIT_FORFEITURE = 9;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_ACTIVE = 1;
  RESERVATION_STATUS_COMMITTED = 2;
  RESERVATION_STATUS_RELEASED = 3;
  RESERVATION_STATUS_EXPIRED = 4;
}

enum UsageOperation {
  USAGE_OPERATION_UNSPECIFIED = 0;
  USAGE_OPERATION_RESERVE = 1;
  USAGE_OPERATION_COMMIT = 2;
  USAGE_OPERATION_RELEASE = 3;
  USAGE_OPERATION_EXPIRE = 4;
}

enum UsageRecordStatus {
  USAGE_RECORD_STATUS_UNSPECIFIED = 0;
  USAGE_RECORD_STATUS_COMMITTED = 1;
  USAGE_RECORD_STATUS_POLAR_PENDING = 2;
  USAGE_RECORD_STATUS_POLAR_REPORTED = 3;
}

enum DeletionStatus {
  DELETION_STATUS_UNSPECIFIED = 0;
  DELETION_STATUS_ACCEPTED = 1;
  DELETION_STATUS_EXTERNAL_ACTION_PENDING = 2;
  DELETION_STATUS_COMPLETE = 3;
}

// ErrorReason is the stable machine-readable reason carried in ErrorDetail.
// New reasons may be added in v1; existing numeric values and meanings never change.
enum ErrorReason {
  ERROR_REASON_UNSPECIFIED = 0;

  // Authentication and token-contract failures.
  ERROR_REASON_AUTHENTICATION_REQUIRED = 1;
  ERROR_REASON_AUTHENTICATION_INVALID = 2;
  ERROR_REASON_AUTHENTICATION_EXPIRED = 3;
  ERROR_REASON_AUTHENTICATION_ISSUER_MISMATCH = 4;
  ERROR_REASON_AUTHENTICATION_AUDIENCE_MISMATCH = 5;
  ERROR_REASON_AUTHENTICATION_SCOPE_MISSING = 6;
  ERROR_REASON_FORWARDED_USER_TOKEN_REQUIRED = 7;
  ERROR_REASON_FORWARDED_USER_TOKEN_INVALID = 8;
  ERROR_REASON_FORWARDED_USER_TOKEN_EXPIRED = 9;

  // Authorization failures.
  ERROR_REASON_PERMISSION_DENIED = 20;
  ERROR_REASON_ORGANIZATION_MEMBERSHIP_REQUIRED = 21;
  ERROR_REASON_TEAM_ACCESS_DENIED = 22;
  ERROR_REASON_SERVICE_METER_NOT_ALLOWED = 23;
  ERROR_REASON_OWNER_ROLE_REQUIRED = 24;
  ERROR_REASON_ADMIN_ROLE_REQUIRED = 25;

  // General resource and conflict failures.
  ERROR_REASON_RESOURCE_NOT_FOUND = 40;
  ERROR_REASON_RESOURCE_DELETED = 41;
  ERROR_REASON_RESOURCE_CONFLICT = 42;
  ERROR_REASON_SLUG_CONFLICT = 43;
  ERROR_REASON_SLUG_INVALID = 44;
  ERROR_REASON_MEMBER_ALREADY_EXISTS = 45;
  ERROR_REASON_MEMBER_NOT_FOUND = 46;
  ERROR_REASON_MEMBER_HAS_ACTIVE_RESERVATIONS = 47;

  // Invitation state and role failures.
  ERROR_REASON_INVITATION_INVALID = 60;
  ERROR_REASON_INVITATION_EXPIRED = 61;
  ERROR_REASON_INVITATION_REVOKED = 62;
  ERROR_REASON_INVITATION_ROLE_INVALID = 63;
  ERROR_REASON_INVITATION_TEAM_REQUIRED = 64;
  ERROR_REASON_INVITATION_EXISTING_MEMBER = 65;

  // Team hierarchy failures.
  ERROR_REASON_TEAM_DEPTH_EXCEEDED = 80;
  ERROR_REASON_TEAM_CYCLE = 81;
  ERROR_REASON_TEAM_CROSS_ORGANIZATION_PARENT = 82;
  ERROR_REASON_GENERAL_TEAM_PROTECTED = 83;
  ERROR_REASON_TEAM_SUBTREE_HAS_ACTIVE_RESERVATIONS = 84;

  // Billing, price, and numeric failures.
  ERROR_REASON_SUBSCRIPTION_INACTIVE = 100;
  ERROR_REASON_SUBSCRIPTION_PAST_DUE = 101;
  ERROR_REASON_SUBSCRIPTION_CANCELED = 102;
  ERROR_REASON_SUBSCRIPTION_REVOKED = 103;
  ERROR_REASON_OVERAGE_NOT_CONFIGURED = 104;
  ERROR_REASON_OVERAGE_DISABLED = 105;
  ERROR_REASON_OVERAGE_LIMIT_EXHAUSTED = 106;
  ERROR_REASON_AVAILABLE_FUNDS_EXHAUSTED = 107;
  ERROR_REASON_PRICE_UNAVAILABLE = 108;
  ERROR_REASON_MONEY_OVERFLOW = 109;
  ERROR_REASON_USAGE_UNITS_INVALID = 110;
  ERROR_REASON_USAGE_UNITS_OVERFLOW = 111;
  ERROR_REASON_CATALOG_PRECISION_INVALID = 112;
  ERROR_REASON_OVERAGE_LIMIT_INVALID = 113;

  // Reservation lifecycle failures.
  ERROR_REASON_RESERVATION_NOT_FOUND = 120;
  ERROR_REASON_RESERVATION_EXPIRED = 121;
  ERROR_REASON_RESERVATION_ALREADY_COMMITTED = 122;
  ERROR_REASON_RESERVATION_ALREADY_RELEASED = 123;
  ERROR_REASON_RESERVATION_FINALIZED = 124;
  ERROR_REASON_COMMIT_UNITS_EXCEED_RESERVED = 125;
  ERROR_REASON_CLIENT_REFERENCE_CONFLICT = 126;
  ERROR_REASON_RESERVATION_UNITS_NEGATIVE = 127;

  // Deletion and ownership failures.
  ERROR_REASON_LAST_OWNER_BLOCKER = 140;
  ERROR_REASON_ACCOUNT_DELETION_BLOCKED = 141;
  ERROR_REASON_ORGANIZATION_DELETION_BLOCKED = 142;
  ERROR_REASON_DELETION_ALREADY_PENDING = 143;

  // Idempotency failures.
  ERROR_REASON_IDEMPOTENCY_KEY_REQUIRED = 160;
  ERROR_REASON_IDEMPOTENCY_CONFLICT = 161;
  ERROR_REASON_IDEMPOTENCY_OPERATION_MISMATCH = 162;
}

enum DeletionBlockerKind {
  DELETION_BLOCKER_KIND_UNSPECIFIED = 0;
  DELETION_BLOCKER_KIND_LAST_ORGANIZATION_OWNER = 1;
  DELETION_BLOCKER_KIND_ACTIVE_USAGE_RESERVATION = 2;
  DELETION_BLOCKER_KIND_PROTECTED_GENERAL_TEAM = 3;
}

message DeletionBlocker {
  DeletionBlockerKind kind = 1;
  UuidV7 organization_id = 2;
  UuidV7 team_id = 3;
  string organization_name = 4;
  string team_name = 5;
}

// ErrorDetail is attached to a non-OK Connect error. message and metadata are
// diagnostic-safe and must never contain credentials, raw tokens, or billing PII.
message ErrorDetail {
  ErrorReason reason = 1;
  string message = 2;
  string resource_type = 3;
  UuidV7 resource_id = 4;
  repeated DeletionBlocker deletion_blockers = 5;
  map<string, string> metadata = 6;
}
